<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estación Meteorológica</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* ===== TU CSS SIN CAMBIOS ===== */
:root {
  --bg: #0c0f14;
  --surface: #141820;
  --surface2: #1c2230;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent-temp: #f97316;
  --accent-hum: #38bdf8;
  --green: #4ade80;
  --red: #f87171;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1.5rem 4rem;
}

/* (resto de tu CSS igual, no lo repito para ahorrar espacio) */
</style>
</head>

<body>

<header>
  <div>
    <div class="logo">ESP32 · Córdoba</div>
    <h1>Estación <span>Meteorológica</span></h1>
  </div>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">cargando...</span>
  </div>
</header>

<main>

<div id="loading-state" class="loading-state">
  <div class="spinner"></div>
  cargando datos...
</div>

<div id="content" style="display:none">

  <div class="big-cards">
    <div class="big-card temp">
      <div class="card-label">temperatura</div>
      <div class="card-value" id="val-temp">--<span class="card-unit">°C</span></div>
      <div class="card-sub" id="sub-temp"></div>
    </div>

    <div class="big-card hum">
      <div class="card-label">humedad relativa</div>
      <div class="card-value" id="val-hum">--<span class="card-unit">%</span></div>
      <div class="card-sub" id="sub-hum"></div>
    </div>
  </div>

  <div class="meta-row">
    <div class="meta-card">
      <div class="card-label">última lectura</div>
      <div class="meta-val" id="meta-ts">--</div>
    </div>
    <div class="meta-card">
      <div class="card-label">lecturas (24h)</div>
      <div class="meta-val" id="meta-count">--</div>
    </div>
    <div class="meta-card">
      <div class="card-label">rango temp.</div>
      <div class="meta-val" id="meta-range">--</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">temperatura · últimas 24h</div>
      <div class="chart-range" id="range-temp"></div>
    </div>
    <div class="chart-wrap"><canvas id="chart-temp"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">humedad · últimas 24h</div>
      <div class="chart-range" id="range-hum"></div>
    </div>
    <div class="chart-wrap"><canvas id="chart-hum"></canvas></div>
  </div>

</div>

<div id="error-state" class="error-state" style="display:none">
  error al cargar datos — comprueba el repositorio
</div>

</main>

<footer>
  <span>github.com/Aminoxamine/Esp32</span>
  <span id="footer-updated"></span>
</footer>

<script>

const DATA_URL = "https://raw.githubusercontent.com/Aminoxamine/Esp32/main/data.json";

/* =========================
   FIX IMPORTANTE: FECHAS
   ========================= */

function fmtTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleTimeString('es-ES', {
    hour: '2-digit',
    minute: '2-digit'
  });
}

function fmtDateTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleString('es-ES', {
    day: '2-digit',
    month: 'short',
    hour: '2-digit',
    minute: '2-digit'
  });
}

/* =========================
   CHART
   ========================= */

function makeChart(id, labels, data, color, dimColor, unit, minY, maxY) {
  const ctx = document.getElementById(id).getContext('2d');

  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: dimColor,
        fill: true,
        borderWidth: 1.5,
        tension: 0.4,
        pointRadius: data.length > 80 ? 0 : 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: {
          ticks: { color: '#6b7280' }
        },
        y: {
          min: minY,
          max: maxY,
          ticks: {
            callback: v => v + ' ' + unit,
            color: '#6b7280'
          }
        }
      }
    }
  });
}

/* =========================
   MAIN LOAD
   ========================= */

let chartTemp = null;
let chartHum = null;

async function load() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await r.json();

    if (!Array.isArray(data) || data.length === 0) return;

    const last = data[data.length - 1];

    const temps = data.map(d => Number(d.t));
    const hums  = data.map(d => Number(d.h));
    const labels = data.map(d => fmtTime(d.ts));

    const minT = Math.min(...temps), maxT = Math.max(...temps);
    const minH = Math.min(...hums),  maxH = Math.max(...hums);

    document.getElementById('val-temp').innerHTML =
      last.t.toFixed(1) + '<span class="card-unit">°C</span>';

    document.getElementById('val-hum').innerHTML =
      last.h.toFixed(1) + '<span class="card-unit">%</span>';

    document.getElementById('meta-ts').textContent = fmtDateTime(last.ts);
    document.getElementById('meta-count').textContent = data.length;

    document.getElementById('footer-updated').textContent =
      'actualizado ' + fmtDateTime(last.ts);

    /* estado online */
    const ago = (Date.now() - new Date(last.ts)) / 60000;
    const dot = document.getElementById('status-dot');

    if (ago < 15) {
      dot.className = 'dot ok';
      document.getElementById('status-text').textContent = 'en línea';
    } else {
      dot.className = 'dot err';
      document.getElementById('status-text').textContent = 'sin datos recientes';
    }

    /* charts reset */
    if (chartTemp) chartTemp.destroy();
    if (chartHum) chartHum.destroy();

    chartTemp = makeChart(
      'chart-temp', labels, temps,
      '#f97316', 'rgba(249,115,22,0.08)', '°C',
      minT - 1, maxT + 1
    );

    chartHum = makeChart(
      'chart-hum', labels, hums,
      '#38bdf8', 'rgba(56,189,248,0.08)', '%',
      0, 100
    );

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch (e) {
    console.error(e);
    document.getElementById('error-state').style.display = 'block';
  }
}

load();
setInterval(load, 5 * 60 * 1000);

</script>
</body>
</html>
